name: Sync deploy branches from main

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Force-sync all deploy branches to main
        run: |
          git push origin main:deploy/sophrologue-pezenas --force
          git push origin main:deploy/sophrologue-beziers --force
